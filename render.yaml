services:
  - type: web
    name: appointment-booking-backend
    runtime: docker
    plan: free # Change to 'starter' or higher for production
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: appointment-booking-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: appointment-booking-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: appointment-booking-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: appointment-booking-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: appointment-booking-db
          property: password
      - key: DATABASE_URL
        fromDatabase:
          name: appointment-booking-db
          property: connectionString
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: PUSHER_APP_ID
        sync: false
      - key: PUSHER_APP_KEY
        sync: false
      - key: PUSHER_APP_SECRET
        sync: false
      - key: PUSHER_APP_CLUSTER
        sync: false

databases:
  - name: appointment-booking-db
    plan: free # Change to 'standard' for production
